<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title and favIcon -->
    <title>Home | Git Issue Tracker</title>
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon" />
    <!-- tailwind and daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Style CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl"
            ><img class="w-10" src="assets/github-logo.png" alt="github-logo" />
            <span class="hidden md:block">GitHub Issues Tracker</span></a
          >
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered md:w-auto"
          />
        </div>
        <button class="btn btn-primary ml-2">Search</button>
      </div>
    </header>

    <main class="py-10">
      <!-- All open close navigaton section -->
      <section
        class="shadow p-5 border border-gray-200 rounded w-10/12 mx-auto"
      >
        <button class="btn btn-primary w-20">All</button>
        <button class="btn w-20">Open</button>
        <button class="btn w-20">Close</button>
      </section>
      <!-- Issue status section  -->
      <section
        class="mt-5 p-5 border border-gray-200 rounded w-10/12 mx-auto flex justify-between items-center"
      >
        <div class="flex items-center gap-3">
          <img src="assets/Aperture.png" alt="Aperture" />
          <div>
            <p class="text-xl font-bold"><span>50</span> Issues</p>
            <p class="text-gray-600">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-2 items-center">
          <div class="flex">
            <span><i class="fa-solid fa-circle text-green-600"></i></span>
            <p>Open</p>
          </div>
          <div class="flex">
            <span><i class="fa-solid fa-circle text-[#A855F7]"></i></span>
            <p>Close</p>
          </div>
        </div>
      </section>
    </main>
    <!-- Js -->
    <script src="home.js"></script>
  </body>
</html>
