<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title and favIcon -->
    <title>Home | Git Issue Tracker</title>
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon" />
    <!-- tailwind and daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Style CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl"
            ><img class="w-10" src="assets/github-logo.png" alt="github-logo" />
            <span class="hidden md:block">GitHub Issues Tracker</span></a
          >
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered md:w-auto"
          />
        </div>
        <button class="btn btn-primary ml-2">Search</button>
      </div>
    </header>

    <main class="py-10">
      <!-- All open close navigaton section -->
      <section
        id="btn-container"
        class="shadow p-5 border border-gray-200 rounded w-10/12 mx-auto flex gap-2"
      >
        <button
          onclick="handleActiveBtn(this)"
          class="btn btn-primary filter-btn w-20"
        >
          All
        </button>
        <button onclick="handleActiveBtn(this)" class="btn filter-btn w-20">
          Open
        </button>
        <button onclick="handleActiveBtn(this)" class="btn filter-btn w-20">
          Close
        </button>
      </section>
      <!-- Issue status section  -->
      <section
        class="mt-5 p-5 border border-gray-200 rounded w-10/12 mx-auto flex justify-between items-center"
      >
        <div class="flex items-center gap-3">
          <img src="assets/Aperture.png" alt="Aperture" />
          <div>
            <p class="text-xl font-bold">
              <span id="allIssuesCounter"></span> Issues
            </p>
            <p class="text-gray-600">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-2 items-center">
          <div class="flex">
            <span><i class="fa-solid fa-circle text-green-600"></i></span>
            <p>Open</p>
          </div>
          <div class="flex">
            <span><i class="fa-solid fa-circle text-[#A855F7]"></i></span>
            <p>Closed</p>
          </div>
        </div>
      </section>

      <!-- Cards section -->
      <section
        id="cardSection"
        class="p-5 border border-gray-200 w-10/12 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-4"
      >
        <!-- Card  -->
      </section>
      <!-- Modal -->
      <dialog id="myModalData" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="modalBox" class="flex flex-col gap-4"></div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>
    <!-- Loder -->
    <div id="loder" class="flex justify-center hidden">
      <span class="loading loading-spinner loading-xl"></span>
    </div>

    <!-- Js -->
    <script src="home.js"></script>
  </body>
</html>
