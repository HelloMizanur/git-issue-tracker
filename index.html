<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title and favIcon -->
    <title>Login | Git Issue Tracker</title>
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon" />
    <!-- tailwind and daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Style CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section
      class="w-11/12 lg:w-5/12 md:w-7/12 mx-auto shadow-2xl my-3 rounded-2xl h-screen py-10 px-10"
    >
      <div class="flex flex-col items-center gap-1">
        <img src="assets/github-logo.png" alt="github-logo" />
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-gray-600">Sign in to manage your issues</p>
      </div>
      <div>
        <fieldset class="fieldset w-full p-4">
          <label class="label">User Name</label>
          <input type="text" class="input w-full" placeholder="User Name" />
          <p class="text-blue-900">Default: admin</p>

          <label class="label">Password</label>
          <input type="password" class="input w-full" placeholder="Password" />
          <p class="text-blue-900">Default: admin123</p>

          <button class="btn btn-primary mt-4">Login</button>
        </fieldset>
        <div class="flex w-full flex-col">
          <div class="divider">OR</div>
        </div>
        <div class="flex flex-col items-center gap-10">
          <p class="text-gray-600">Demo Credentials:</p>
          <p class="flex flex-col items-center">
            <span>Username: admin </span> <span> Password: admin123</span>
          </p>
        </div>
      </div>
    </section>

    <!-- Js -->
    <script src="script.js"></script>
  </body>
</html>
